    <h1>HOJA DE VIDA</h1>
    <p>Registra tu información para crear tu portafolio.</p>

<form>
    <h2>DATOS PERSONALES</h2>
    <div>
        <label>Nombre Completo</label>
        <input type="text" id="full-name" placeholder="Ingresa tu nombre completo" required>
    </div><br>
    <div>
        <label>Correo</label>
        <input type="email" id="email" placeholder="Ingresa tu correo electronico" required>
    </div><br>
    <div>
        <label>Celular</label>
        <input type="tel" id="phone" placeholder="Ingresa tu numero celular" required>
    </div><br>
    <div>
        <label>Dirección</label>
        <input type="text" id="address" placeholder="Ingresa tu dirección" required>
    </div><br>
    <div>
        <label>Sobre Mí</label><br>
        <textarea id="profile" placeholder="Habla sobre tu perfil profesional" maxlength="2000" cols="50" rows="7"></textarea>
    </div><br>
    
    <h2>EDUCACIÓN</h2>
    <div>
        <label>Institución</label>
        <input type="text" id="institution" placeholder="Nombre de la institución">
    </div><br>
    <div>
        <label>Grado Profesional</label>
        <select id="degree">
            <option disabled selected>Seleccione una opción</option>
            <option>Tecnico</option>
            <option>Tecnologo</option>
            <option>Profesional</option>
        </select>
    </div><br>
    <div>
        <label>Fecha de Inicio a Final</label><br>
        Desde <input type="date" id="graduation1">
        Hasta <input type="date" id="graduation2">
    </div><br>
    
    <h2>EXPERIENCIA LABORAL</h2>
    <div>
        <label>Empresa</label>
        <input type="text" id="company" placeholder="Nombre de la empresa">
    </div><br>
    <div>
        <label>Ocupación</label>
        <input type="text" id="job" placeholder="Ingresa tu anterior puesto">
    </div><br>
    <div>
        <label>Duración</label><br>
        Desde <input type="date" id="duration1"/>
        Hasta <input type="date" id="duration2"/>
    </div><br>
    <div>
        <label>Habilidades</label><br>
        <textarea id="skills" placeholder="Ingresa tus habilidades para el puesto"></textarea>
    </div><br>

    <h2>PROYECTOS</h2>
    <div>
        <label>Proyecto 1</label><br>
        <textarea id="project" placeholder="Ingresa la descripcion del proyecto"></textarea>
    </div><br>
    <div>
        <label>Rol</label>
        <input type="text" id="role" placeholder="Ingresa el rol ejercido">
    </div><br>
    <div>
        <label>Referiencias</label><br>
        <textarea id="references" placeholder="Ingresa referencias"></textarea>
    </div><br>
    
    <div>
        <button type="submit" id="finished">Enviar</button>
    </div>
</form>
