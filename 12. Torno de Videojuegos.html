    <h1>TORNEO DE VIDEOJUEGOS</h1>
    <p>Registra la información para participar al codicioso torneo de tu videojuego favorito.</p>

<form>
    <h2>DATOS PERSONALES</h2>
    <div>
        <label>Nombre Completo</label>
        <input type="text" id="full-name" placeholder="Ingresa tu nombre completo" required>
    </div><br>
    <div>
        <label>Correo</label>
        <input type="email" id="email" placeholder="Ingresa tu correo electronico" required>
    </div><br>
    <div>
        <label>Celular</label>
        <input type="tel" id="phone" placeholder="Ingresa tu numero celular" required>
    </div><br>

    <h2>VIDEOJUEGO</h2>
    <div>
        <label>Plataforma</label><br>
        <input type="radio" id="pc" name="platform" required>
        <label for="pc">PC</label>
        <input type="radio" id="xbox" name="platform">
        <label for="xbox">Xbox</label>
        <input type="radio" id="ps" name="platform">
        <label for="ps">PlayStation</label> 
    </div><br>
    <div>
        <label>Videojuegos</label><br>
        <select id="game" required>
            <option value="" disabled selected>Seleccione una opción</option>
            <option>Call Of Duty</option>
            <option>Apex Legends</option>
            <option>Destiny 2</option>
            <option>No Man's Sky</option>
            <option>Need for Speed Heat</option>
            <option>Roblox</option>
        </select>
    </div><br>
    
    <div>
        <button type="submit" id="finished">Enviar</button>
    </div>
</form>
