    <h1>RESERVACIÓN DE RESTAURANTE</h1>
    <p>Registra tu información para realizar tu reservación.</p>

<form>
    <h2>DATOS</h2>
    <div>
        <label>Nombre</label>
        <input type="text" id="name" placeholder="Ingresa tu nombre" required>
    </div><br>
    <div>
        <label>Apellido</label>
        <input type="text" id="lastname" placeholder="Ingresa tu apellido" required>
    </div><br>
    <div>
        <label>Correo</label>
        <input type="email" id="email" placeholder="Ingresa tu correo electronico" required>
    </div><br>
    <div>
        <label>Celular</label>
        <input type="tel" id="phone" placeholder="Ingresa tu numero celular" required>
    </div><br>
    <div>
        <label>Fecha</label>
        <input type="date" id="date" required>
    </div><br>
    <div>
        <label>Tiempo</label>
        <input type="time" id="time" required>
    </div><br>
    <div>
        <label>Numero de Personas</label>
        <input type="number" id="guests" required>
    </div><br>

    <div>
        <button type="submit" id="finished">Enviar</button>
    </div>
</form>
