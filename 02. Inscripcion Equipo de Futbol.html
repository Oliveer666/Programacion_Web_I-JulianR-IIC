    <h1>REGISTRO EQUIPO DE FUTBOL</h1>
    <p>Registra la información para la formación de tu equipo.</p>

<form>
    <div>
        <img src="../Programacion_Web_I/Recursos/PFP.png" width="64" height="64" alt="Logo de Equipo"/>
        <input type="file" id="logo" accept="image/*">
    </div>
    
    <h2>CAPITAN DE EQUIPO</h2>
    <div>
        <label>Nombre de Equipo</label>
        <input id="team-name" placeholder="Ingresa el nombre de equipo" required>
    </div><br>
    <div>
        <label>Nombre de Capitan</label>
        <input id="captain-name" placeholder="Ingresa el nombre de capitan" required>
    </div><br>
    <div>
        <label>Edad</label>
        <input type="number" id="age" placeholder="Ingresa tu edad" min="10" max="18" required>
    </div><br>
    <div>
        <label>Información de Contacto</label>
        <input type="text" id="contact-info" placeholder="Correo o celular" required>
    </div><br>
    <div>
        <label>Nombre de Entrenador</label>
        <input type="text" id="coach-name" placeholder="Ingresa el nombre de entrenador" required>
    </div><br>

    <h2>POSICIONES Y HABILIDADES</h2>
    <p>¿En que posicion te defines mas?</p>
    <div>
        <input type="checkbox" id="goalkeeper">
        <label for="goalkeeper">Arquero</label><br>
        <input type="checkbox" id="defender">
        <label for="defender">Defensas</label><br>
        <input type="checkbox" id="midfielder">
        <label for="midfielder">Puntero</label><br>
        <input type="checkbox" id="striker">
        <labelstriker">Delanteros</label>
    </div>

    <p>¿Cual es tu nivel de aprendizaje?</p>
    <div>
        <label>Nivel de Habilidad</label><br>
        <input type="radio" id="beginner" name="skills" required>
        <label for="beginner">Aprendiz</label>
        <input type="radio" id="intermediate" name="skills">
        <label for="intermediate">Intermedio</label>
        <input type="radio" id="advanced" name="skills">
        <label for="advanced">Avanzado</label>
    </div><br>

    <h2>JUGADORES</h2>
    <div>
        <label>Nombre</label>
        <input type="text" id="player1-name" placeholder="Ingresa tu nombre" required>
        <label>Edad</label>
        <input type="number" min="10" max="18" id="player1-age" placeholder="Ingresa tu edad" required>
        <label>Posición</label>
        <select id="player1-position" required>
            <option value="" disabled selected>Seleccione tu posición</option>
            <option>Arquero</option>
            <option>Defensas</option>
            <option>Puntero</option>
            <option>Delantero</option>
        </select>
    </div>
    <div>
        <label>Nombre</label>
        <input type="text" id="player2-name" placeholder="Ingresa tu nombre" required>
        <label>Edad</label>
        <input type="number" min="10" max="18" id="player2-age" placeholder="Ingresa tu edad" required>
        <label>Posición</label>
        <select id="player2-position" required>
            <option value="" disabled selected>Seleccione tu posición</option>
            <option>Arquero</option>
            <option>Defensas</option>
            <option>Puntero</option>
            <option>Delantero</option>
        </select>
    </div>
    <div>
        <label>Nombre</label>
        <input type="text" id="player3-name" placeholder="Ingresa tu nombre" required>
        <label>Edad</label>
        <input type="number" min="10" max="18" id="player3-age" placeholder="Ingresa tu edad" required>
        <label>Posición</label>
        <select id="player3-position" required>
            <option value="" disabled selected>Seleccione tu posición</option>
            <option>Arquero</option>
            <option>Defensas</option>
            <option>Puntero</option>
            <option>Delantero</option>
        </select>
    </div><br>

    <div>
        <button type="submit" id="finished">Enviar</button>
    </div>
</form>
