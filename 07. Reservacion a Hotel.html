    <h1>RESERVACION DE HOTEL</h1>
    <p>Registra la información para hospedarde en nuestro hotel.</p>

<form>
    <h2>DATOS PERSONALES</h2>
    <div>
        <label>Nombre Completo</label>
        <input type="text" id="full-name" placeholder="Ingresa tu nombre completo" required>
    </div><br>
    <div>
        <label>Correo</label>
        <input type="email" id="email" placeholder="Ingresa tu correo electronico" required>
    </div><br>
    <div>
        <label>Celular</label>
        <input type="tel" id="phone" placeholder="Ingresa tu numero celular" required>
    </div><br>

    <h2>HABITACIONES</h2>
    <div>
        <label>Numero de Habitadiones</label>
        <select id="rooms" required>
            <option value="" disabled selected>Seleccione una opción</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
        </select>
    </div><br>
    <div>
        <label>Numero de Invitados en la Habitacion #2</label>
        <select id="room01" required>
            <option value="" disabled selected>Seleccione una opción</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
        </select>
    </div><br>
    <div>
        <label>Numero de Invitados en la Habitacion #2</label>
        <select id="room02" required>
            <option value="" disabled selected>Seleccione una opción</option>
            <option>Ninguno</option>
            <option value="room02">1</option>
            <option>2</option>
            <option>3</option>¿ s
            <option>4</option>
        </select>
    </div><br>
    <div>
        <label>Numero de Invitados en la Habitacion #3</label>
        <select id="room03" required>
            <option value="" disabled selected>Seleccione una opción</option>
            <option>Ninguno</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
        </select>
    </div><br>
    <div>
        <label>Tiempo de Hospedaje</label><br>
        Desde <input type="date" id="start" required>
        Hasta <input type="date" id="end" required>
    </div><br>
    <div>
        <label>Comentarios</label><br>
        <textarea id="comments" placeholder="Nota adiccional" maxlength="2000" cols="50" rows="7"></textarea>
    </div><br>

    <div>
        <button type="submit" id="finished">Enviar</button>
    </div>
</form>
