    <h1>PRESTAMO DE LA BIBLIOTECA</h1>
    <p>Registra tu información para realizar un prestamo periodico de algun libro.</p>

<form>
    <h2>DATOS PERSONALES</h2>
    <div>
        <label>Nombre Completo</label>
        <input type="text" id="full-name" placeholder="Ingresa tu nombre completo" required>
    </div><br>
    <div>
        <label>Celular</label>
        <input type="tel" id="phone" placeholder="Ingresa tu numero celular" required>
    </div><br>
    <div>
        <label>Correo</label>
        <input type="email" id="email" placeholder="Ingresa tu correo electronico" required>
    </div><br>

    <h2>CARACTERISTICAS DEL LIBRO</h2>
    <div>
        <label>Titulo</label>
        <input type="text" id="tittle" placeholder="Ingresa el titulo del libro" required>
    </div><br>
    <div>
        <label>Autor</label>
        <input type="text" id="email" placeholder="Ingresa el autor del libro" required>
    </div><br>
    <div>
        <label>Codigo del Libro</label>
        <input type="number" id="phone" placeholder="Ingresa el codigo del libro" required>
    </div><br>
    <div>
        <label>Periodo de Prestamo</label>
        <select id="time-frame" required>
            <option value="" disabled selected>Seleccione una opción</option>
            <option>7 Dias</option>
            <option>14 Dias</option>
            <option>21 Dias</option>
        </select>
    </div><br>

    <div>
        <button type="submit" id="finished">Enviar</button>
    </div>
</form>
